# fly.toml app configuration file generated for mtls-api on 2026-02-17T21:42:51-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "mtls-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Port 8443 with handlers = [] = raw TCP passthrough.
# Fly does NOT terminate TLS — the Node mTLS server handles the handshake
# directly so the client certificate is visible for mTLS enforcement.
[[services]]
  internal_port = 8443
  protocol = "tcp"

  [[services.ports]]
    port = 8443
    handlers = []   # raw TCP passthrough — mTLS terminates in the app

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024