app            = "mtls-api"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[services]]
  internal_port = 8443
  protocol      = "tcp"

  [[services.ports]]
    port     = 8443
    handlers = []

[[vm]]
  memory   = '1gb'
  cpu_kind = 'shared'
  cpus     = 1