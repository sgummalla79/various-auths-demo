# fly.toml app configuration file generated for mtls-api on 2026-02-17T21:42:51-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "mtls-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8443"

[[services]]
  internal_port = 8443
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls"]

  [[services.ports]]
    port = 8443
    handlers = []

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
